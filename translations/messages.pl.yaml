story:
    introduction:
        heading: 'Wprowadzenie'
        paragraph: 'Kraina Talahm została spowita niepokojem – wieść o tym wstrząsnęła całą ludnością Wiecznego Królestwa: potężny magiczny relikt został skradziony. Jego prawdziwa potęga znana jest tylko nadwornym naukowcom, którzy przeprowadzali na nim liczne eksperymenty. Król rozporządził natychmiast, aby rozpoczęto poszukiwania oraz zatrzymano wszystkie osoby powiązane z tym zdarzeniem. W celu usprawnienia poszukiwań wyprawieni zostali Włóczędzy, czyli rycerze szkoleni w tajemnych sztukach magii bitewnej, przystosowani do infiltracji, tropienia i przede wszystkim – skutecznej, samodzielnej pracy. Wciel się w jednego z nich, aby udać się na poszukiwanie zagubionego reliktu! Przemierzaj magiczne krainy Talahm, odkrywając nowe rejony, a zarazem niosąc sławę Wiecznemu Królestwu. W trakcie wyprawy poznasz:'
    talahm:
        heading: 'O Talahm'
        paragraph: 'Kraina słynąca z dobrobytu gospodarczego od zarania dziejów należy do Wiecznego Królestwa. Jej wyjątkowa natura dała początek magii, jaka znana jest powszechnie, choć praktykowana przez niewielu. Przez ten fakt nastąpiło tu zróżnicowanie otoczenia – obszary takie jak Pola Obfitości, Zgniły Las, Góry Grozy czy też mityczne Jaskinie Nocy zostały starannie spisane w dokumentach królestwa i przeniesione na mapy. Naturalnie zróżnicowanie flory i fauny przyczynia się też do powstawania nowych gatunków stworzeń – zarówno tych plugawych, niczym Aspekty Zgnilizny, jak i bardziej urokliwych, jak Dzikie Ważkowce.'
    eternal_kingdom:
        heading: 'O Wiecznym Królestwie'
        paragraph: 'W rzeczywistości nikt nie jest pewien, kiedy faktycznie powstało, lecz jedno jest pewne – zdecydowanie nigdy nie przeminie. Rządzone przez królów, którzy wybierani są zgodnie z głosem ludu, wciąż prosperuje. Jego technologia została oparta na magicznej energii pozyskiwanej przez tajne techniki nadwornych naukowców. To dzięki niej każdy mieszkaniec może cieszyć się między innymi oświetleniem w domach. Krążą pogłoski, że to właśnie skradziony relikt jest jedną z maszyn odpowiedzialnych za konwertowanie jej w moc zasilającą całe królestwo. Jeśli okażą się one prawdą, może to znacząco zaszkodzić opinii o bezpieczeństwie na jego obszarze.'
    vagabonds:
        heading: 'O Włóczęgach'
        paragraph: 'Aby dogłębnie poznać i okiełznać chaotyczną naturę magii Talahm, potrzeba wielu lat praktyki. Dlatego członkowie zakonu Włóczęgów, którego nazwa wywodzi się z podróżniczego trybu życia jego braci, rozpoczynają ją od najmłodszych lat. Opracowanie skutecznych metod obchodzenia się z tak dewastującą mocą nie było łatwe, ale z czasem zaczęto czynić znaczące postępy w jej zrozumieniu. Pierwotnie używana do podtrzymywania pokoju, została przekształcona w sztukę bitewną z powodu licznych konfliktów z sąsiadującymi nacjami. Zakon Włóczęgów zmienił się w królewskie oddziały specjalne – podczas wojny z Imperium Kaata odegrał on kluczową rolę w infiltracji oraz destabilizacji wroga. Obecnie doktryna zakonu uległa zmianie. Dalej odprawiają oni wyprawy, lecz są one najczęściej powiązane z misjami nadawanymi przez samego Króla.'

