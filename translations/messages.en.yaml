'Witaj!': 'Welcome!'

story:
    introduction:
        heading: 'Introduction'
        paragraph: 'The land of Talahm has been shrouded in unrest—news of it has shaken the entire population of the Eternal Kingdom: a powerful magical relic has been stolen. Its true power is known only to the royal scientists who conducted numerous experiments on it. The King immediately ordered a search to begin and the arrest of all individuals connected to this event. To streamline the search, Vagabonds have been dispatched—knights trained in the arcane arts of battle magic, adapted for infiltration, tracking, and above all, effective independent work. Take on the role of one of them to embark on a quest to find the lost relic! Traverse the magical lands of Talahm, discovering new regions while bringing glory to the Eternal Kingdom. During your journey, you will experience:'
    talahm:
        heading: 'About Talahm'
        paragraph: 'A land renowned for its economic prosperity, it has belonged to the Eternal Kingdom since the dawn of time. Its unique nature gave rise to magic, which is widely known, though practiced by few. This fact has led to a diversification of the environment—areas such as the Fields of Plenty, the Rotting Forest, the Mountains of Dread, or the mythical Caves of the Night have been carefully documented in the kingdom''s records and mapped out. Naturally, the diversification of flora and fauna also contributes to the emergence of new species of creatures—both the foul ones, like the Aspects of Rot, and the more charming ones, like the Wild Dragonflies.'
    eternal_kingdom:
        heading: 'About the Eternal Kingdom'
        paragraph: 'In reality, no one is sure when it was actually founded, but one thing is certain—it will definitely never pass away. Ruled by kings chosen according to the voice of the people, it continues to prosper. Its technology is based on magical energy harvested through the secret techniques of royal scientists. Thanks to this, every citizen can enjoy, among other things, lighting in their homes. Rumor has it that the stolen relic is one of the machines responsible for converting this energy into power that supplies the entire kingdom. If these rumors prove true, it could significantly damage the perception of security within its borders.'
    vagabonds:
        heading: 'About the Vagabonds'
        paragraph: 'To deeply understand and harness the chaotic nature of Talahm''s magic requires many years of practice. That is why members of the Vagabond Order, whose name derives from the traveling lifestyle of its brethren, begin their training from a very young age. Developing effective methods of handling such devastating power was not easy, but over time, significant progress was made in understanding it. Originally used to maintain peace, it was transformed into a martial art due to numerous conflicts with neighboring nations. The Vagabond Order evolved into royal special forces—during the war with the Kaata Empire, it played a key role in the infiltration and destabilization of the enemy. Currently, the doctrine of the order has changed. They still embark on expeditions, but these are most often linked to missions assigned by the King himself.'

